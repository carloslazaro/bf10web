<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comparativa SACOS BF 10</title>
<style>
  body { background: #e0e0e0; font-family: Arial, sans-serif; padding: 30px; }
  h1 { text-align: center; color: #333; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .card h3 { margin: 0 0 15px 0; color: #555; font-size: 16px; }
  svg { width: 100%; height: auto; }
</style>
</head>
<body>
<h1>Comparativa - SACOS BF 10</h1>
<div class="grid">

  <div class="card">
    <h3>V1 - Original (letter-spacing: -5)</h3>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
      <rect width="800" height="350" fill="#F5F5F0"/>
      <rect x="50" y="30" width="700" height="6" fill="#00A94F" rx="3"/>
      <text x="400" y="155" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">SACOS</text>
      <text x="400" y="270" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="140" fill="#DA291C" text-anchor="middle" letter-spacing="-5">BF 10</text>
      <rect x="50" y="310" width="700" height="6" fill="#00A94F" rx="3"/>
    </svg>
  </div>

  <div class="card">
    <h3>V2 - Muy junto (letter-spacing: -10)</h3>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
      <rect width="800" height="350" fill="#F5F5F0"/>
      <rect x="50" y="30" width="700" height="6" fill="#00A94F" rx="3"/>
      <text x="400" y="155" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">SACOS</text>
      <text x="400" y="270" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="140" fill="#DA291C" text-anchor="middle" letter-spacing="-10">BF 10</text>
      <rect x="50" y="310" width="700" height="6" fill="#00A94F" rx="3"/>
    </svg>
  </div>

  <div class="card">
    <h3>V3 - Sin espacio, todo pegado (BF10)</h3>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
      <rect width="800" height="350" fill="#F5F5F0"/>
      <rect x="50" y="30" width="700" height="6" fill="#00A94F" rx="3"/>
      <text x="400" y="155" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">SACOS</text>
      <text x="400" y="270" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="140" fill="#DA291C" text-anchor="middle" letter-spacing="-5">BF10</text>
      <rect x="50" y="310" width="700" height="6" fill="#00A94F" rx="3"/>
    </svg>
  </div>

  <div class="card">
    <h3>V4 - Separado normal (letter-spacing: 0)</h3>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
      <rect width="800" height="350" fill="#F5F5F0"/>
      <rect x="50" y="30" width="700" height="6" fill="#00A94F" rx="3"/>
      <text x="400" y="155" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">SACOS</text>
      <text x="400" y="270" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="140" fill="#DA291C" text-anchor="middle" letter-spacing="0">BF 10</text>
      <rect x="50" y="310" width="700" height="6" fill="#00A94F" rx="3"/>
    </svg>
  </div>

  <div class="card">
    <h3>V5 - BF aún más grande (160px, spacing -8)</h3>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
      <rect width="800" height="380" fill="#F5F5F0"/>
      <rect x="50" y="30" width="700" height="6" fill="#00A94F" rx="3"/>
      <text x="400" y="150" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">SACOS</text>
      <text x="400" y="295" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="160" fill="#DA291C" text-anchor="middle" letter-spacing="-8">BF 10</text>
      <rect x="50" y="340" width="700" height="6" fill="#00A94F" rx="3"/>
    </svg>
  </div>

  <div class="card">
    <h3>V6 - BF grande + todo pegado (BF10, 160px)</h3>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
      <rect width="800" height="380" fill="#F5F5F0"/>
      <rect x="50" y="30" width="700" height="6" fill="#00A94F" rx="3"/>
      <text x="400" y="150" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">SACOS</text>
      <text x="400" y="295" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="160" fill="#DA291C" text-anchor="middle" letter-spacing="-8">BF10</text>
      <rect x="50" y="340" width="700" height="6" fill="#00A94F" rx="3"/>
    </svg>
  </div>

</div>
</body>
</html>
